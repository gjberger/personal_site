g stays flat.","t":4},{"id":"hpc.8","q":"From memory, name the collective behind each of these and give one sentence why: DDP gradient sync, Megatron-style tensor parallel forward/backward, ZeRO optimizer sharding.","a":"DDP: allreduce (NCCL) over gradient buckets, because every rank needs the same averaged gradient to take an identical optimizer step. Tensor parallel: allgather to reassemble activations split across ranks, and reduce-scatter to combine partial outputs while leaving each rank its shard; an allreduce is exactly those two glued together. ZeRO: optimizer states (then gradients, then parameters at stage 3) are sharded across ranks; parameters are allgathered on demand right before use, and gradients are reduce-scattered so each rank updates only its shard.","t":3},{"id":"hpc.9","q":"Compute the FLOP-per-byte balance point of the Jetson Orin Nano (fp32 ~1.28 TFLOPS, LPDDR5 ~68 GB/s). Then explain the communication-avoiding mindset in two or three sentences, recompute vs move bytes, with activation checkpointing as the example.","a":"1.28e12 FLOP/s / 68e9 B/s ≈ 18.8 FLOPs per byte (assumes 1024 CUDA cores × 0.625 GHz × 2 FLOP/core/cycle = 1.28 TFLOPS). Any kernel doing fewer than about 19 fp32 FLOPs per byte moved is memory bound, so FLOPs are nearly free relative to bytes. That inverts the old instinct: it is often faster to recompute a value than to store and reload it. Activation checkpointing is the canonical case: discard activations in the forward pass and recompute them during backward, trading roughly one extra forward (~33% more FLOPs) for a large cut in memory footprint and traffic.","t":3},{"id":"hpc.10","q":"Two parts. (a) One paragraph: you write torch.distributed and NCCL now, not MPI; why does the MPI mental model still pay rent? (b) One sentence: what a pipeline parallel bubble is, including the bubble fraction for p stages and m microbatches.","a":"(a) NCCL and torch.distributed implement the same collective contracts MPI defined: who contributes what and who ends with what, plus the alpha-beta cost model (a latency term per step plus bytes over bandwidth), so ring vs tree allreduce, chunking, and compute-communication overlap are all reasoned about in that vocabulary; a slow gradient sync is diagnosed with exactly the same accounting even though the API changed. (b) A pipeline bubble is the idle time stages spend waiting for the pipeline to fill and drain, with bubble fraction (p-1)/(m+p-1), shrunk by raising the microbatch count m; the inference analog is stages idling while KV cache blocks move between them.","t":4}]}];

(function(){
var API='/.netlify/functions/progress';
var START=new Date(2026,6,6);
var WKDECK={1:'basics',2:'gemm',3:'roofline',4:'softmax',5:'quantkv',6:'fa',7:'mixed',8:'conc',9:'mixed',10:'mixed',11:'mixed',12:'mixed'};
var PERSIST={cpp:'wk 2+',torch:'wk 3+',prob:'weekly',hpc:'fall'};
var CATS=['MISREAD','CONCEPT','MECH','SPEED','BLANK'];
var LONG={softmax:1,fa:1,prob:1};

function wkNow(){ var w=Math.floor((new Date()-START)/(7*864e5))+1; return Math.min(12,Math.max(1,w)); }
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(x){ var d=document.createElement('i'); d.textContent=x; return d.innerHTML; }
function byKey(k){ for(var i=0;i<DECKS.length;i++) if(DECKS[i].deck===k) return DECKS[i]; return null; }

// local state: last-round misses per deck, local best
var LS='drills-v1';
function lget(){ try{ return JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){ return {}; } }
function lset(s){ try{ localStorage.setItem(LS,JSON.stringify(s)); }catch(e){} }

// shared state: GET for PB display; POST partial bodies, server union-merges
var cloudPB=null, cloud=false;
function status(t){ document.getElementById('sync').textContent=t; }
fetch(API,{credentials:'include'}).then(function(r){ return r.ok?r.json():Promise.reject(r.status); }).then(function(c){
  cloud=true;
  var m=(c&&c.mm||[]).map(function(x){return +x.v||0});
  cloudPB=m.length?Math.max.apply(null,m):null;
  status('✓ synced'); if(view==='home') home();
}).catch(function(){ status('offline · local only'); });
function push(body,ok){
  fetch(API,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){ status(r.ok?'✓ synced':'saved locally'); if(ok)ok(!!r.ok); })
    .catch(function(){ status('offline · local only'); if(ok)ok(false); });
}

var app=document.getElementById('app');
var view='home';

// ---------- home ----------
function deckRow(d,now,tag){
  return '<button class="deck'+(now?' now':'')+'" data-k="'+d.deck+'"><span class="dk">'+d.deck+'</span><span class="dt">'+esc(d.title)+'</span>'+(now?'<span class="tw">THIS WEEK</span>':(tag?'<span class="tw" style="color:var(--muted)">'+tag+'</span>':''))+'<span class="dn">'+d.prompts.length+'</span></button>';
}
function home(){
  view='home';
  var wk=wkNow(), nowKey=WKDECK[wk], s=lget();
  var pb=cloudPB!==null?cloudPB:(s.pb||null);
  var h='<div class="pbrow"><span class="rec"><span>WEEK</span> <b>'+wk+' of 12</b></span><span class="rec"><span>DRILL PB</span> <b>'+(pb===null?'–':pb)+'</b></span><span class="rec"><span>ROUND</span> <b>10 min · 15 for FA + prob</b></span></div>';
  h+='<div class="cad"><b>THE CADENCE</b> · 15 min every day, glued to first coffee, 7 days a week<br><b>MON + WED</b> kernel round on the week&rsquo;s deck (10 min · 15 in FA weeks)<br><b>TUE</b> one LC medium, python · <b>THU</b> one LC medium, C++<br><b>FRI</b> retest day: every miss from +48h and this week, then the 20-min review<br><b>SAT</b> LC pair, OA-style 2×22 + the 15-min prob set · <b>SUN</b> the floor: one prompt counts<br>misses retest at <b>+48h and FRI</b> · fail both → flashcard + a named STUDY slot next week<br>the daily 15 runs until the last interview · recall half-life ≈ 2 weeks</div>';
  if(!DECKS.length){ app.innerHTML=h+'<p class="mut">No decks loaded. The deck data block is pending a rebuild.</p>'; return; }
  h+='<p class="label">This week</p>';
  if(nowKey==='mixed'){ h+='<button class="deck now" data-k="mixed"><span class="dk">mixed</span><span class="dt">Mixed round · everything unlocked so far</span><span class="tw">THIS WEEK</span></button>'; }
  else { var dnow=byKey(nowKey); if(dnow) h+=deckRow(dnow,true); }
  h+='<p class="label">The ladder</p>';
  for(var i=1;i<=8;i++){ var k=WKDECK[i]; if(k&&k!=='mixed'&&k!==nowKey){ var d=byKey(k); if(d) h+=deckRow(d,false,'wk '+i); } }
  if(nowKey!=='mixed') h+='<button class="deck" data-k="mixed"><span class="dk">mixed</span><span class="dt">Mixed round</span><span class="dn">sampler</span></button>';
  h+='<p class="label">Always on</p>';
  for(var k2 in PERSIST){ var d2=byKey(k2); if(d2) h+=deckRow(d2,false,PERSIST[k2]); }
  h+='<p class="mut" style="margin-top:14px">Round first, blank paper in hand. Study mode is for after, not instead: long-press or use the study link inside a deck.</p>';
  app.innerHTML=h;
  [].slice.call(app.querySelectorAll('.deck')).forEach(function(b){
    b.addEventListener('click',function(){ startRound(b.dataset.k); });
  });
}

// ---------- round ----------
var R=null, tick=null;
function buildQueue(key){
  var s=lget(), missed=(s.miss&&s.miss[key])||[];
  var d;
  if(key==='mixed'){
    var wk=wkNow(), pool=[];
    DECKS.forEach(function(x){
      var unlocked = PERSIST[x.deck] ? true : false;
      for(var w=1;w<=Math.min(wk,8);w++) if(WKDECK[w]===x.deck) unlocked=true;
      if(!unlocked) return;
      var ps=x.prompts.slice().sort(function(){return Math.random()-0.5});
      pool=pool.concat(ps.slice(0,2));
    });
    d={deck:'mixed',title:'Mixed round',prompts:pool.sort(function(){return Math.random()-0.5}).slice(0,12)};
  } else d=byKey(key);
  if(!d) return null;
  var first=d.prompts.filter(function(p){return missed.indexOf(p.id)>=0});
  var rest=d.prompts.filter(function(p){return missed.indexOf(p.id)<0}).sort(function(){return Math.random()-0.5});
  return {deck:d, queue:first.concat(rest)};
}
function startRound(key){
  var b=buildQueue(key); if(!b) return;
  var mins=LONG[key]?15:10;
  R={key:key,deck:b.deck,q:b.queue,i:0,clean:0,miss:[],revealed:false,end:Date.now()+mins*60000,total:mins*60000};
  clearInterval(tick); tick=setInterval(clock,1000);
  view='round'; prompt_();
}
function clock(){
  if(!R) return;
  var left=R.end-Date.now();
  var bar=document.getElementById('rbar'), lab=document.getElementById('rleft');
  if(bar) bar.style.width=Math.max(0,left/R.total*100)+'%';
  if(lab) lab.textContent=left>0?Math.floor(left/60000)+':'+String(Math.floor(left%60000/1000)).padStart(2,'0'):'0:00';
  if(left<=0){ clearInterval(tick); summary('clock done · an expired timer is data, not failure'); }
}
function prompt_(){
  if(!R) return;
  if(R.i>=R.q.length){ clearInterval(tick); summary('deck cleared'); return; }
  var p=R.q[R.i];
  app.innerHTML=
    '<a class="back" href="#" id="quit">◂ decks</a>'+
    '<div class="tbar"><i id="rbar" style="width:100%"></i></div>'+
    '<div class="tmeta"><span>'+esc(R.deck.title)+' · '+(R.i+1)+' / '+R.q.length+'</span><span id="rleft"></span></div>'+
    '<div class="card pulse"><span class="ptag">DRILL</span><span class="pid">'+p.id+'</span><span class="ptime">'+p.t+' min</span>'+
    '<p class="q">'+p.q+'</p>'+
    (R.revealed?'<div class="a">'+p.a+'</div>':'')+
    '<div class="btns" id="btns"></div><div id="missbox"></div></div>'+
    '<p class="hint" id="hint"></p>';
  var btns=document.getElementById('btns');
  if(!R.revealed){
    btns.innerHTML='<button class="big rv" id="rv">Reveal reference</button>';
    document.getElementById('rv').onclick=function(){ R.revealed=true; prompt_(); };
  } else {
    btns.innerHTML='<button class="big go" id="cl">Clean ✓</button><button class="big ms" id="ms">Miss ✗</button>';
    document.getElementById('cl').onclick=function(){ R.clean++; R.revealed=false; R.i++; prompt_(); };
    document.getElementById('ms').onclick=missForm;
  }
  document.getElementById('quit').onclick=function(e){ e.preventDefault(); clearInterval(tick); summary('round stopped early'); };
  clock();
}
function missForm(){
  var p=R.q[R.i], box=document.getElementById('missbox'), sel=null;
  var chips=CATS.map(function(c){return '<span class="chip" data-c="'+c+'">'+c+'</span>'}).join(' ');
  box.innerHTML='<div class="mrow">'+chips+'</div><div class="mrow"><input id="fix" type="text" placeholder="fix, one actionable sentence"><button class="small" id="lg">LOG MISS</button><button class="small" id="sk">skip log</button></div>';
  [].slice.call(box.querySelectorAll('.chip')).forEach(function(ch){
    ch.addEventListener('click',function(){ sel=ch.dataset.c; [].slice.call(box.querySelectorAll('.chip')).forEach(function(x){x.classList.toggle('sel',x===ch)}); });
  });
  function advance(){ R.miss.push(p.id); R.revealed=false; R.i++; prompt_(); }
  document.getElementById('sk').onclick=advance;
  document.getElementById('lg').onclick=function(){
    var fix=document.getElementById('fix').value.trim();
    if(!sel||!fix){ document.getElementById('hint').textContent='need: category + a one-sentence fix'; return; }
    push({log:[{dd:iso(new Date()),src:('DRILL '+p.id).slice(0,24),cat:sel,fix:fix.slice(0,120),r48:0,rfri:0}]});
    document.getElementById('hint').textContent='logged · retest it at +48h and FRI';
    advance();
  };
}
function summary(note){
  view='sum';
  var s=lget();
  s.miss=s.miss||{}; s.miss[R.key]=R.miss.slice();
  if(R.clean>(s.pb||0)) s.pb=R.clean;
  lset(s);
  var misses=R.miss.length?R.miss.map(function(id){return '<span class="miss-id">'+id+'</span>'}).join(' · '):'none';
  app.innerHTML=
    '<a class="back" href="#" id="back">◂ decks</a>'+
    '<div class="card"><span class="ptag">ROUND</span><span class="pid">'+esc(R.deck.title)+'</span>'+
    '<p class="q"><b>'+R.clean+' clean</b> of '+(R.clean+R.miss.length)+' seen · '+esc(note)+'</p>'+
    '<p class="sumline">misses: '+misses+'</p>'+
    '<p class="sumline mut">misses lead the queue next round · re-derive them on paper within 24h</p>'+
    '<div class="btns"><button class="big go" id="logscore">LOG SCORE → trainer</button><button class="small" id="again">again</button>'+
    (R.key==='softmax'?'<button class="small" id="lab1">open the stepper</button>':'')+
    (R.key==='roofline'?'<button class="small" id="lab2">open the roofline</button>':'')+
    '<button class="small" id="study">study mode</button></div><p class="hint" id="hint"></p></div><div id="labbox"></div>';
  document.getElementById('back').onclick=function(e){ e.preventDefault(); home(); };
  document.getElementById('again').onclick=function(){ startRound(R.key); };
  document.getElementById('study').onclick=function(){ studyMode(R.key); };
  document.getElementById('logscore').onclick=function(){
    var v=R.clean;
    push({mm:[{d:iso(new Date()),v:v}]},function(ok){
      if(cloudPB===null||v>cloudPB) cloudPB=v;
      document.getElementById('hint').textContent=(ok?'score in the shared log':'saved on this device')+' · clean: '+v;
    });
  };
  var l1=document.getElementById('lab1'); if(l1) l1.onclick=function(){ softmaxLab(document.getElementById('labbox')); };
  var l2=document.getElementById('lab2'); if(l2) l2.onclick=function(){ rooflineLab(document.getElementById('labbox')); };
}

// ---------- study ----------
function studyMode(key){
  view='study';
  var d=(key==='mixed')?null:byKey(key); if(!d){ home(); return; }
  var h='<a class="back" href="#" id="back">◂ decks</a><p class="label">'+esc(d.title)+' · <b>study mode</b> · tap to reveal</p>';
  d.prompts.forEach(function(p){
    h+='<div class="studyq"><span class="pid" style="margin-left:0">'+p.id+'</span><p class="q">'+p.q+'</p><div class="a">'+p.a+'</div></div>';
  });
  if(key==='softmax') h+='<div id="labbox"></div><p style="margin-top:10px"><button class="small" id="lab1">open the stepper</button></p>';
  if(key==='roofline') h+='<div id="labbox"></div><p style="margin-top:10px"><button class="small" id="lab2">open the roofline</button></p>';
  app.innerHTML=h;
  document.getElementById('back').onclick=function(e){ e.preventDefault(); home(); };
  [].slice.call(app.querySelectorAll('.studyq')).forEach(function(x){ x.addEventListener('click',function(){ x.classList.toggle('open'); }); });
  var l1=document.getElementById('lab1'); if(l1) l1.onclick=function(){ softmaxLab(document.getElementById('labbox')); };
  var l2=document.getElementById('lab2'); if(l2) l2.onclick=function(){ rooflineLab(document.getElementById('labbox')); };
}

// ---------- lab: online-softmax stepper ----------
function softmaxLab(box){
  var x=[3.1,0.7,5.2,1.9,2.4,4.8,0.3,3.9], T=4;
  var t1=x.slice(0,T), t2=x.slice(T);
  function mx(a){ return Math.max.apply(null,a); }
  function l(a,m){ return a.reduce(function(s,v){return s+Math.exp(v-m)},0); }
  var m1=mx(t1), l1=l(t1,m1), m2=mx(t2), l2=l(t2,m2);
  var m=Math.max(m1,m2), a1=Math.exp(m1-m), a2=Math.exp(m2-m), L=a1*l1+a2*l2;
  var direct=l(x,mx(x));
  var f=function(v){return v.toFixed(4)};
  var steps=[
    '<b>scores</b> · ['+x.join(', ')+'] · tiles of '+T+'. Softmax needs a global max and a global sum, but we only see one tile at a time.',
    '<b>tile 1</b> ['+t1.join(', ')+'] · m₁ = '+f(m1)+' · ℓ₁ = Σ e^(x−m₁) = '+f(l1),
    '<b>tile 2</b> ['+t2.join(', ')+'] · m₂ = '+f(m2)+' · ℓ₂ = '+f(l2),
    '<b>merge</b> · m = max(m₁,m₂) = '+f(m)+' · rescale: e^(m₁−m) = '+f(a1)+', e^(m₂−m) = '+f(a2)+' · ℓ = '+f(a1)+'×'+f(l1)+' + '+f(a2)+'×'+f(l2)+' = <b>'+f(L)+'</b>',
    '<b>check</b> · direct one-pass sum with the true max: '+f(direct)+' · identical. The merge is exact and associative: that is the whole license FlashAttention needs to stream K/V tiles.'
  ];
  var i=0;
  function draw(){
    box.innerHTML='<div class="lab"><h4>ONLINE SOFTMAX · STEP '+(i+1)+' / '+steps.length+'</h4><p class="note">'+steps[i]+'</p><div class="btns"><button class="small" id="prev">◂</button><button class="small" id="next">step ▸</button></div></div>';
    document.getElementById('next').onclick=function(){ i=Math.min(steps.length-1,i+1); draw(); };
    document.getElementById('prev').onclick=function(){ i=Math.max(0,i-1); draw(); };
    box.scrollIntoView({block:'nearest'});
  }
  draw();
}

// ---------- lab: roofline ----------
function rooflineLab(box){
  var BW=68, PEAK=1280; // GB/s, GFLOPS fp32 (assumes ~0.625 GHz, 2 FLOP/core/cycle)
  box.innerHTML='<div class="lab"><h4>ROOFLINE · ORIN NANO</h4>'+
    '<div class="mrow"><input id="rf" placeholder="GFLOPs done"><input id="rb" placeholder="GB moved"><input id="rt" placeholder="ms taken"><button class="small" id="plot">plot</button></div>'+
    '<div class="mrow"><button class="chip" id="p1">vector-add 1M</button><button class="chip" id="p2">naive matmul 1024³</button><button class="chip" id="p3">tiled T=32</button></div>'+
    '<svg id="rsvg" viewBox="0 0 340 230" style="width:100%;margin-top:8px"></svg>'+
    '<p class="note" id="rnote">ridge at '+(PEAK/BW).toFixed(1)+' FLOP/B: left of it bandwidth owns you, right of it compute does. Enter your kernel’s numbers from Nsight.</p></div>';
  var svg=document.getElementById('rsvg');
  function X(ai){ return 40+(Math.log10(ai)+1.5)*(280/4); }   // AI 0.03..300
  function Y(gf){ return 200-(Math.log10(gf)+0.5)*(180/4); }  // 0.3..3000 GFLOPS
  function line(x1,y1,x2,y2,c,w){ return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+(w||1)+'"/>'; }
  function base(){
    var ridge=PEAK/BW;
    var h=line(40,200,330,200,'#272727')+line(40,10,40,200,'#272727');
    h+=line(X(0.03),Y(0.03*BW),X(ridge),Y(PEAK),'#C08A3E',2);
    h+=line(X(ridge),Y(PEAK),X(300),Y(PEAK),'#7CA470',2);
    h+='<text x="'+(X(ridge)-6)+'" y="'+(Y(PEAK)-6)+'" fill="#8C8C86" font-size="9" font-family="monospace">'+PEAK+' GFLOPS</text>';
    h+='<text x="44" y="'+(Y(2)-6)+'" fill="#8C8C86" font-size="9" font-family="monospace" transform="rotate(-33 44 '+(Y(2)-6)+')">'+BW+' GB/s</text>';
    h+='<text x="300" y="214" fill="#8C8C86" font-size="9" font-family="monospace">FLOP/B</text>';
    [0.1,1,10,100].forEach(function(v){ h+='<text x="'+(X(v)-4)+'" y="214" fill="#8C8C86" font-size="9" font-family="monospace">'+v+'</text>'; });
    return h;
  }
  function plot(gf,gb,ms){
    var ai=gf/gb, ach=gf/(ms/1000), bound=Math.min(BW*ai,PEAK);
    var h=base();
    h+='<circle cx="'+X(ai)+'" cy="'+Y(ach)+'" r="5" fill="#C05B4C"/>';
    svg.innerHTML=h;
    document.getElementById('rnote').innerHTML='AI = '+ai.toFixed(2)+' FLOP/B · achieved '+ach.toFixed(1)+' GFLOPS · bound here is '+bound.toFixed(1)+' · you are at <b>'+(ach/bound*100).toFixed(0)+'%</b> of the roof. '+(ai<PEAK/BW?'Bandwidth-bound: move fewer bytes (tiling, fusion, lower precision).':'Compute-bound: feed the cores (ILP, tensor cores).');
  }
  svg.innerHTML=base();
  document.getElementById('plot').onclick=function(){
    var gf=+document.getElementById('rf').value, gb=+document.getElementById('rb').value, ms=+document.getElementById('rt').value;
    if(gf>0&&gb>0&&ms>0) plot(gf,gb,ms);
  };
  function preset(gf,gb,ms){ document.getElementById('rf').value=gf; document.getElementById('rb').value=gb; document.getElementById('rt').value=ms; plot(gf,gb,ms); }
  // vector-add 1M fp32: 1e6 FLOP = 0.001 GFLOP; 12 MB = 0.012 GB; ~0.2 ms on ~60 GB/s effective
  document.getElementById('p1').onclick=function(){ preset(0.001,0.012,0.2); };
  // naive 1024^3 matmul: 2.147 GFLOP; ~2K reads/output * 4B = 8.59 GB; ~150 ms typical naive
  document.getElementById('p2').onclick=function(){ preset(2.147,8.59,150); };
  // tiled T=32: traffic /32 = 0.268 GB; ~12 ms
  document.getElementById('p3').onclick=function(){ preset(2.147,0.268,12); };
}

home();
})();
