<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="theme-color" content="#0B0B0B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --bg:#0B0B0B;--surface:#141414;--raised:#1E1E1E;--line:#272727;
    --text:#F4F2EC;--muted:#8C8C86;--accent-dim:#CFCDC6;
    --drill:#C05B4C;--study:#C08A3E;--build:#7CA470;
    --mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
    --sans:"Avenir Next","Futura",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);margin:0}
  body{-webkit-tap-highlight-color:transparent}
  .wrap{max-width:460px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
    padding:calc(20px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom))}
  header{display:flex;align-items:center;gap:12px;padding:2px 0 4px}
  .seal{width:40px;height:40px;flex:none;background:var(--text);color:var(--bg);border-radius:6px;
    display:grid;place-items:center;font-family:var(--mincho);font-size:24px}
  .htitle{font-size:15px;font-weight:700;letter-spacing:.01em}
  .htitle span{font-family:var(--mincho);color:var(--muted);font-weight:500;margin-left:6px}
  #sync{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}

  main{flex:1;display:flex;flex-direction:column;justify-content:center}
  .greet{font-family:var(--mincho);font-size:clamp(26px,7vw,34px);font-weight:500;margin:0 0 3px}
  .phase{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:0 0 14px}
  .bar{height:6px;background:var(--raised);border-radius:3px;overflow:hidden;margin:0 0 5px}
  .bar i{display:block;height:100%;width:0;background:var(--build);transition:width .4s}
  @media (prefers-reduced-motion:reduce){.bar i{transition:none}}
  .meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:20px;font-variant-numeric:tabular-nums}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 20px 20px}
  .card.pulse{animation:pulse .4s ease}
  @keyframes pulse{0%{transform:scale(.985);opacity:.5}100%{transform:scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.card.pulse{animation:none}}
  .stag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--raised)}
  .stag.b{color:var(--build)}.stag.st{color:var(--study)}.stag.d{color:var(--drill)}.stag.x{color:var(--accent-dim)}.stag.setup{color:var(--accent-dim)}
  .stag.sh{background:var(--text);color:var(--bg)}
  .swk{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:10px;letter-spacing:.04em}
  .stext{font-size:18px;line-height:1.45;margin:14px 0 0}
  .ssub{font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--muted);margin:12px 0 0;border-top:1px solid var(--line);padding-top:10px}
  .ssub b{color:var(--drill);font-weight:700}
  .shipnote{color:var(--build);font-weight:650}
  .btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .done{flex:1;min-width:170px;font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.02em;padding:16px;border-radius:12px;background:var(--build);color:var(--bg);border:none;cursor:pointer}
  .done:active{filter:brightness(.92)}
  .done:focus-visible,.skip:focus-visible{outline:2px solid var(--accent-dim);outline-offset:2px}
  .skip{font-family:var(--mono);font-size:12px;padding:16px;border-radius:12px;background:var(--raised);color:var(--muted);border:1px solid var(--line);cursor:pointer}
  .hype{font-family:var(--mono);font-size:12px;color:var(--build);min-height:16px;margin:12px 2px 0;font-weight:700}
  .shelf{display:flex;gap:4px;margin:18px 0 0}
  .shelf span{flex:1;height:6px;border-radius:3px;background:var(--raised)}
  .shelf span.on{background:var(--build)}

  .map{margin:20px 0 0;border:1px solid var(--line);border-radius:12px;background:var(--surface);overflow:hidden}
  .lvl{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer}
  .lvl:last-child{border-bottom:none}
  .lvl .nm{width:74px;flex:none;letter-spacing:.06em}
  .lvl .st{margin-left:auto;font-variant-numeric:tabular-nums}
  .lvl.cur{color:var(--text)}
  .lvl.cur .dot{color:var(--build)}
  .lvl.clear .dot,.lvl.clear{color:var(--build)}
  .lvl.locked{opacity:.45;cursor:default}
  .lvl .dot{width:14px;flex:none;text-align:center}
  .lvl .mini{display:flex;gap:3px;flex:1;max-width:110px}
  .lvl .mini i{flex:1;height:4px;border-radius:2px;background:var(--raised)}
  .lvl .mini i.on{background:var(--build)}
  .lvl.cur{background:var(--raised)}
  .pop{position:relative}
  .pop::after{content:"\2713";position:absolute;inset:0;display:grid;place-items:center;font-size:34px;color:var(--build);
    animation:pop .5s ease forwards;pointer-events:none}
  @keyframes pop{0%{opacity:0;transform:scale(.4)}45%{opacity:1;transform:scale(1.15)}100%{opacity:0;transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){.pop::after{animation:none;opacity:0}}
  footer{display:flex;justify-content:space-between;margin-top:20px;font-family:var(--mono);font-size:11px}
  footer a{color:var(--build);text-decoration:none;font-weight:700}
</style>
</head>

function lset(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
function sync(s){ var e=document.getElementById('sync'); if(e)e.textContent=s; }
function save(){ lset(); if(timer)clearTimeout(timer); timer=setTimeout(function(){
  sync('saving\u2026');
  fetch(API,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)})
    .then(function(r){ sync(r.ok?'\u2713 synced':'saved locally'); })
    .catch(function(){ sync('offline \u00b7 on this device'); });
},600); }

// --- campaign engine ---
var DATES={1:"JUL 6\u201312",2:"JUL 13\u201319",3:"JUL 20\u201326",4:"JUL 27\u2013AUG 2",5:"AUG 3\u20139",6:"AUG 10\u201316",7:"AUG 17\u201323",8:"AUG 24\u201330",9:"AUG 31\u2013SEP 6",10:"SEP 7\u201313",11:"SEP 14\u201320",12:"SEP 21\u201327"};
var app=document.getElementById('app'), focusWk=null;
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function today(){ return iso(new Date()); }
function greet(){ var h=new Date().getHours(); return h<12?'Morning, Gabriel.':h<18?'Hi Gabriel.':'Evening, Gabriel.'; }
function ctToday(){ var c=state.ct; return (c&&c.d===today())?c.n:0; }
function bump(){ var t=today(); state.ct=(state.ct&&state.ct.d===t)?{d:t,n:state.ct.n+1}:{d:t,n:1}; }
function pick(){ var a=['Done.','Nice. Next.','Logged.','That is a rep.','Onward.','Good. Keep moving.']; return a[ctToday()%a.length]; }
function snoozed(k){ return state.sn && state.sn[k]===today(); }
function snooze(k){ if(!state.sn||typeof state.sn!=='object') state.sn={}; state.sn[k]=today(); }
function locked(s){ return s.wk>=2 && !state['w'+(s.wk-1)+'s']; }
function wkSteps(w){ return STEPS.filter(function(x){return x.wk===w;}); }
function wkDone(w){ return wkSteps(w).every(function(x){return state[x.k];}); }
function pickNext(){
  var pool=STEPS.filter(function(x){return !state[x.k] && !locked(x);});
  if(!pool.length) return null;
  if(focusWk!==null){ var f=pool.filter(function(x){return x.wk===focusWk;}); if(f.length) pool=f; }
  var fresh=pool.filter(function(x){return !snoozed(x.k);});
  return fresh[0]||pool[0];
}
function mapRow(w){
  var steps=wkSteps(w), done=steps.filter(function(x){return state[x.k];}).length;
  var isClear=done===steps.length, isLocked=w>=2&&!state['w'+(w-1)+'s'];
  var nm=w===0?'PROLOGUE':'WK '+w, dt=w===0?'setup':DATES[w]||'';
  var cls='lvl'+(isClear?' clear':isLocked?' locked':'');
  var cur=window.__nextWk===w&&!isClear; if(cur) cls+=' cur';
  var dot=isClear?'\u2713':isLocked?'\u25AA':cur?'\u25C9':'\u25CB';
  var mini='';
  steps.forEach(function(x){ mini+='<i class="'+(state[x.k]?'on':'')+'"></i>'; });
  var st=isLocked?('ship wk '+(w-1)+' to open'):isClear?'cleared':done+'/'+steps.length;
  return '<div class="'+cls+'" data-w="'+w+'" role="button" tabindex="'+(isLocked?-1:0)+'">'+
    '<span class="dot">'+dot+'</span><span class="nm">'+nm+'</span>'+
    '<span class="mini">'+mini+'</span><span class="st">'+st+' \u00b7 '+dt+'</span></div>';
}
function render(msg){
  var done=STEPS.filter(function(x){return state[x.k];}).length, total=STEPS.length;
  var next=pickNext();
  window.__nextWk=next?next.wk:null;
  var map='<div class="map">'; for(var w=0;w<=12;w++) map+=mapRow(w); map+='</div>';

  if(!next){
    app.innerHTML='<p class="greet">'+greet()+'</p><p class="phase">campaign complete</p>'+
      '<div class="card"><p class="stext">All '+total+' steps done. Every SHIP shipped, start to finish.</p>'+
      '<p class="ssub">Time for the fall edition. Tell Claude: \u201cthe plan is done, build the fall campaign.\u201d</p></div>'+map;
    wire(); return;
  }
  var phase=next.wk===0?'Prologue \u00b7 setup':'Week '+next.wk+' of 12'+(focusWk!==null?' \u00b7 focused':'');
  var sub='';
  if(next.tc==='d'&&next.ds){ sub='<p class="ssub">'+next.ds+'</p>'; }
  else if(next.tc==='sh'){ sub='<p class="ssub"><span class="shipnote">This is the SHIP. Clearing it unlocks week '+(next.wk+1<=12?next.wk+1:'\u2014')+'.</span></p>'; }
  var ct=ctToday();
  app.innerHTML=
    '<p class="greet">'+greet()+'</p><p class="phase">'+phase+'</p>'+
    '<div class="bar"><i style="width:'+(done/total*100)+'%"></i></div>'+
    '<div class="meta"><span>'+done+' / '+total+' steps</span><span>'+(next.wk===0?'prologue':'week '+next.wk)+'</span></div>'+
    '<div class="card" id="card"><span class="stag '+next.tc+'">'+next.tl+'</span><span class="swk">'+(next.wk===0?'WEEK 0':'WEEK '+next.wk)+'</span>'+
      '<p class="stext">'+next.tx+'</p>'+sub+
      '<div class="btns"><button class="done" id="done" type="button">'+(next.tc==='sh'?'SHIP it \u2713':'Mark done \u2713')+'</button>'+
      '<button class="skip" id="skip" type="button">not now</button></div></div>'+
    '<p class="hype" id="hype">'+(msg||(ct?('cleared today: '+ct):''))+'</p>'+map;

  document.getElementById('done').onclick=function(){
    var wasShip=next.tc==='sh', wk=next.wk, k=next.k;
    state[k]=1; bump(); save();
    var line;
    if(wasShip && wk>=1 && wk<12) line='SHIP logged. Week '+(wk+1)+' is open.';
    else if(wkDone(wk)) line=(wk===0?'Prologue':'Week '+wk)+' cleared. The map is greener.';
    else line=pick();
    render(line+' \u00b7 cleared today: '+ctToday());
    var c=document.getElementById('card'); if(c)c.classList.add('pop');
  };
  document.getElementById('skip').onclick=function(){ snooze(next.k); save(); render('snoozed for today'); };
  wire();
}
function wire(){
  [].forEach.call(document.querySelectorAll('.lvl'),function(r){
    var w=+r.dataset.w;
    if(r.classList.contains('locked')) return;
    function go(){ focusWk=(focusWk===w?null:w); render(); }
    r.addEventListener('click',go);
    r.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();go();} });
  });
}

// paint from cache, then reconcile with cloud (cloud wins)
state=lget(); render(); sync('\u2026');
fetch(API,{credentials:'include'}).then(function(r){ return r.ok?r.json():Promise.reject(); }).then(function(c){
  if(c&&typeof c==='object'){ state=Object.assign({},state,c); lset(); render(); sync('\u2713 synced'); }
}).catch(function(){ sync('offline \u00b7 on this device'); });
</script>
