<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="theme-color" content="#0B0B0B">

<title>Trainer</title>
<style>
  :root{
    --bg:#0B0B0B;--surface:#141414;--raised:#1E1E1E;--line:#272727;
    --text:#F4F2EC;--muted:#8C8C86;--accent-dim:#CFCDC6;
    --drill:#C05B4C;--study:#C08A3E;--build:#7CA470;
    --mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
    --sans:"Avenir Next","Futura",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);margin:0}
  body{-webkit-tap-highlight-color:transparent}
  .wrap{max-width:460px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
    padding:calc(20px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom))}
  header{display:flex;align-items:center;gap:12px;padding:2px 0 4px}
  .seal{width:40px;height:40px;flex:none;background:var(--text);color:var(--bg);border-radius:6px;
    display:grid;place-items:center;font-family:var(--mincho);font-size:24px}
  .htitle{font-size:15px;font-weight:700;letter-spacing:.01em}
  .htitle span{font-family:var(--mincho);color:var(--muted);font-weight:500;margin-left:6px}
  #sync{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}

  main{flex:1;display:flex;flex-direction:column;justify-content:center}
  .greet{font-family:var(--mincho);font-size:clamp(26px,7vw,34px);font-weight:500;margin:0 0 3px}
  .phase{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:0 0 14px}
  .bar{height:6px;background:var(--raised);border-radius:3px;overflow:hidden;margin:0 0 5px}
  .bar i{display:block;height:100%;width:0;background:var(--build);transition:width .4s}
  @media (prefers-reduced-motion:reduce){.bar i{transition:none}}
  .meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:20px;font-variant-numeric:tabular-nums}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 20px 20px}
  .card.pulse{animation:pulse .4s ease}
  @keyframes pulse{0%{transform:scale(.985);opacity:.5}100%{transform:scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.card.pulse{animation:none}}
  .stag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--raised)}
  .stag.b{color:var(--build)}.stag.st{color:var(--study)}.stag.d{color:var(--drill)}.stag.x{color:var(--accent-dim)}.stag.setup{color:var(--accent-dim)}
  .stag.sh{background:var(--text);color:var(--bg)}
  .swk{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:10px;letter-spacing:.04em}
  .stext{font-size:18px;line-height:1.45;margin:14px 0 0}
  .ssub{font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--muted);margin:12px 0 0;border-top:1px solid var(--line);padding-top:10px}
  .ssub b{color:var(--drill);font-weight:700}
  .shipnote{color:var(--build);font-weight:650}
  .whybtn{background:none;border:none;padding:0;margin:14px 2px 0;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:.04em}
  .whybtn:focus-visible{outline:2px solid var(--accent-dim);outline-offset:2px}
  .why b{color:var(--build)}
  .btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .done{flex:1;min-width:170px;font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.02em;padding:16px;border-radius:12px;background:var(--build);color:var(--bg);border:none;cursor:pointer}
  .done:active{filter:brightness(.92)}
  .done:focus-visible,.skip:focus-visible{outline:2px solid var(--accent-dim);outline-offset:2px}
  .skip{font-family:var(--mono);font-size:12px;padding:16px;border-radius:12px;background:var(--raised);color:var(--muted);border:1px solid var(--line);cursor:pointer}
  .hype{font-family:var(--mono);font-size:12px;color:var(--build);min-height:16px;margin:12px 2px 0;font-weight:700}
  .shelf{display:flex;gap:4px;margin:18px 0 0}
  .shelf span{flex:1;height:6px;border-radius:3px;background:var(--raised)}
  .shelf span.on{background:var(--build)}

  .map{margin:20px 0 0;border:1px solid var(--line);border-radius:12px;background:var(--surface);overflow:hidden}
  .lvl{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer}
  .lvl:last-child{border-bottom:none}
  .lvl .nm{width:74px;flex:none;letter-spacing:.06em}
  .lvl .st{margin-left:auto;font-variant-numeric:tabular-nums}
  .lvl.cur{color:var(--text)}
  .lvl.cur .dot{color:var(--build)}
  .lvl.clear .dot,.lvl.clear{color:var(--build)}
  .lvl.locked{opacity:.45;cursor:default}
  .lvl .dot{width:14px;flex:none;text-align:center}
  .lvl .mini{display:flex;gap:3px;flex:1;max-width:110px}
  .lvl .mini i{flex:1;height:4px;border-radius:2px;background:var(--raised)}
  .lvl .mini i.on{background:var(--build)}
  .lvl.cur{background:var(--raised)}
  .pop{position:relative}
  .pop::after{content:"\2713";position:absolute;inset:0;display:grid;place-items:center;font-size:34px;color:var(--build);
    animation:pop .5s ease forwards;pointer-events:none}
  @keyframes pop{0%{opacity:0;transform:scale(.4)}45%{opacity:1;transform:scale(1.15)}100%{opacity:0;transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){.pop::after{animation:none;opacity:0}}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:20}
  .backdrop.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;background:var(--surface);border:1px solid var(--line);border-bottom:none;
    border-radius:16px 16px 0 0;max-width:460px;margin:0 auto;max-height:78dvh;overflow-y:auto;
    padding:16px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(102%);transition:transform .28s ease}
  .sheet.open{transform:translateY(0)}
  @media (prefers-reduced-motion:reduce){.sheet{transition:none}.backdrop{transition:none}}
  .sh-title{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
  .sh-title button{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px}
  .srow{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .srow input{background:var(--raised);border:1px solid var(--line);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:13px;padding:9px 10px}
  .srow input:focus-visible{outline:2px solid var(--accent-dim);outline-offset:1px}
  #zV{width:120px}#sSrc{width:100px}#sFix{flex:1;min-width:160px}
  .chip{font-family:var(--mono);font-size:10px;padding:6px 9px;border-radius:6px;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer}
  .chip.sel{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:700}
  .go{font-family:var(--mono);font-size:11px;font-weight:700;padding:9px 13px;border-radius:7px;background:var(--text);color:var(--bg);border:none;cursor:pointer}
  .go:focus-visible{outline:2px solid var(--accent-dim);outline-offset:2px}
  .sline{font-family:var(--mono);font-size:11px;color:var(--build);min-height:15px;margin:2px 0 10px;font-weight:700}
  .sdiv{border-top:1px solid var(--line);margin:12px 0}
  #sCounts{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin:0 0 6px}
  .lg{font-family:var(--mono);font-size:10.5px;line-height:1.7;color:var(--accent-dim);border-bottom:1px solid var(--line);padding:6px 0}
  .lg:last-child{border-bottom:none}
  .lg .cat{color:var(--drill);font-weight:700}
  .lg .fx{color:var(--muted)}
  .lg .del{color:var(--muted);cursor:pointer;float:right;padding:0 4px}
  .lg label{color:var(--muted);cursor:pointer;margin-left:8px;white-space:nowrap}
  .lg input{accent-color:#7CA470}
  footer button.linky{background:none;border:none;padding:0;font:inherit;color:var(--build);font-weight:700;cursor:pointer}
  footer{display:flex;justify-content:center;margin-top:20px;font-family:var(--mono);font-size:11px}
  footer a{color:var(--build);text-decoration:none;font-weight:700}
</style>
</head>

<div class="wrap">
  <header>
    <div class="seal">訓</div>
    <div class="htitle">Trainer<span>訓練</span></div>

    <p class="sline" id="sMsg"></p>
    <p id="sCounts"></p>
    <div id="sList"></div>
  </div>
  <footer>
    <button class="linky" id="logBtn" type="button">log a score / miss ▴</button>
  </footer>
</div>

// --- slim cloud sync: same KEY + endpoint as the plan, so state is shared ---
var KEY='training-plan-v1', API='/.netlify/functions/progress';
var state={}, timer=null, cloudReady=false, saveQueued=false;
function lget(){ try{ return JSON.parse(localStorage.getItem(KEY)||'{}'); }catch(e){ return {}; } }
function lset(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
function sync(s){ var e=document.getElementById('sync'); if(e)e.textContent=s; }
// union-merge, mirror of the server's: arrays (mm/log) never shrink from a stale
// counterpart, `over` wins scalars, dl tombstones make log deletions stick
function mergeState(base,over){
  var out={},k; for(k in base)out[k]=base[k]; for(k in over)out[k]=over[k];
  var dl={}; [].concat(base.dl||[],over.dl||[]).forEach(function(x){ if(typeof x==='string')dl[x]=1; });
  var seen={},mm=[];
  [].concat(base.mm||[],over.mm||[]).forEach(function(e){
    if(!e||typeof e!=='object')return; var key=e.d+'|'+e.v;
    if(!seen[key]){seen[key]=1;mm.push(e);} });
  out.mm=mm.sort(function(a,b){return a.d<b.d?-1:a.d>b.d?1:0;});
  var byK={},order=[];
  [].concat(base.log||[],over.log||[]).forEach(function(e){
    if(!e||typeof e!=='object')return; var key=e.dd+'|'+e.src+'|'+e.fix;
    if(dl[key])return;
    if(!byK[key]){byK[key]=e;order.push(key);}
    else byK[key]={dd:e.dd,src:e.src,cat:byK[key].cat,fix:e.fix,r48:(byK[key].r48||e.r48)?1:0,rfri:(byK[key].rfri||e.rfri)?1:0}; });
  out.log=order.map(function(key){return byK[key];}).sort(function(a,b){return a.dd<b.dd?-1:a.dd>b.dd?1:0;});
  out.pb={}; [base.pb,over.pb].forEach(function(p){ if(p&&typeof p==='object')for(var q in p)out.pb[q]=p[q]; });
  out.sn={}; [base.sn,over.sn].forEach(function(p){ if(p&&typeof p==='object')for(var q in p)out.sn[q]=p[q]; });
  var bc=base.ct,oc=over.ct;
  if(bc&&oc) out.ct=bc.d===oc.d?{d:bc.d,n:Math.max(bc.n||0,oc.n||0)}:(oc.d>bc.d?oc:bc);
  out.dl=Object.keys(dl).slice(-50);
  return out;
}
function tomb(e){ if(!Array.isArray(state.dl))state.dl=[]; state.dl.push(e.dd+'|'+e.src+'|'+e.fix); if(state.dl.length>50)state.dl=state.dl.slice(-50); }
function save(){ lset();
  if(!cloudReady){ saveQueued=true; return; } // never POST a state built without the cloud's keys
  if(timer)clearTimeout(timer); timer=setTimeout(function(){
  sync('saving\u2026');
  fetch(API,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)})
    .then(function(r){ sync(r.ok?'\u2713 synced':'saved locally'); })
    .catch(function(){ sync('offline \u00b7 on this device'); });
},600); }

  var next=pickNext();
  window.__nextWk=next?next.wk:null;
  var map='<div class="map">'; for(var w=0;w<=12;w++) map+=mapRow(w); map+='</div>';

  if(!next){
    app.innerHTML='<p class="greet">'+greet()+'</p><p class="phase">campaign complete</p>'+
      '<div class="card"><p class="stext">All '+total+' steps done. Every SHIP shipped, start to finish.</p>'+
      '<p class="ssub">Time for the fall edition. Tell Claude: \u201cthe plan is done, build the fall campaign.\u201d</p></div>'+map;
    wire(); return;
  }
  var phase=next.wk===0?'Prologue \u00b7 setup':'Week '+next.wk+' of 12'+(focusWk!==null?' \u00b7 focused':'');
  var sub='';
  if(next.tc==='d'&&next.ds){ sub='<p class="ssub">'+next.ds+'</p>'; }
  else if(next.tc==='sh'){ sub='<p class="ssub"><span class="shipnote">This is the SHIP. Clearing it unlocks week '+(next.wk+1<=12?next.wk+1:'\u2014')+'.</span></p>'; }
  var ct=ctToday();
  // why + done-when, current card only: future steps' detail stays out of reach by design
  var why=WHY[next.k]?'<button class="whybtn" id="whyBtn" type="button" aria-expanded="false">why this? \u25b8</button>'+
    '<p class="ssub why" id="why" hidden>'+WHY[next.k]+'</p>':'';
  app.innerHTML=
    '<p class="greet">'+greet()+'</p><p class="phase">'+phase+'</p>'+
    '<div class="bar"><i style="width:'+(done/total*100)+'%"></i></div>'+
    '<div class="meta"><span>'+done+' / '+total+' steps</span><span>'+(next.wk===0?'prologue':'week '+next.wk)+'</span></div>'+
    '<div class="card" id="card"><span class="stag '+next.tc+'">'+next.tl+'</span><span class="swk">'+(next.wk===0?'WEEK 0':'WEEK '+next.wk)+'</span>'+
      '<p class="stext">'+next.tx+'</p>'+sub+why+
      '<div class="btns"><button class="done" id="done" type="button">'+(next.tc==='sh'?'SHIP it \u2713':'Mark done \u2713')+'</button>'+
      '<button class="skip" id="skip" type="button">not now</button></div></div>'+
    '<p class="hype" id="hype">'+(msg||(ct?('cleared today: '+ct):''))+'</p>'+map;

  document.getElementById('done').onclick=function(){
    var wasShip=next.tc==='sh', wk=next.wk, k=next.k;
    state[k]=1; bump(); save();
    var line;
    if(wasShip && wk>=1 && wk<12) line='SHIP logged. Week '+(wk+1)+' is open.';
    else if(wkDone(wk)) line=(wk===0?'Prologue':'Week '+wk)+' cleared. The map is greener.';
    else line=pick();
    render(line+' \u00b7 cleared today: '+ctToday());
    var c=document.getElementById('card'); if(c)c.classList.add('pop');
  };
  document.getElementById('skip').onclick=function(){ snooze(next.k); save(); render('snoozed for today'); };
  var wb=document.getElementById('whyBtn');
  if(wb) wb.onclick=function(){
    var w=document.getElementById('why'), open=w.hidden;
    w.hidden=!open; wb.setAttribute('aria-expanded',open?'true':'false');
    wb.textContent='why this? '+(open?'▾':'▸');
  };
  wire();
}
function wire(){
  [].forEach.call(document.querySelectorAll('.lvl'),function(r){
    var w=+r.dataset.w;
    if(r.classList.contains('locked')) return;
    function go(){ focusWk=(focusWk===w?null:w); render(); }
    r.addEventListener('click',go);
    r.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();go();} });
  });
}

// --- the log sheet: same record shapes as the plan (state.mm / state.log / state.pb) ---
var CATS=['MISREAD','CONCEPT','MECH','SPEED','BLANK'];
var RX={MISREAD:'slow the reading ritual',CONCEPT:'more STUDY, not reps',MECH:'more mental math + a slower final pass',SPEED:'reps of that pattern until boring',BLANK:'ladder too fast, flag it at FRI review'};
var START=new Date(2026,6,6), selCat=null;
function arr(k){ if(!Array.isArray(state[k])) state[k]=[]; return state[k]; }
function wkOfD(ds){ return Math.min(12,Math.max(1,Math.floor((new Date(ds+'T12:00:00')-START)/(7*864e5))+1)); }
function zeta(){ var m=arr('mm').map(function(x){return +x.v||0}); return m.length?Math.max.apply(null,m):null; }
function zLine(msg){ var el=document.getElementById('zLine'); if(msg){el.textContent=msg;return;}
  var m=arr('mm'); el.textContent=m.length?('PB '+zeta()+' \u00b7 last: '+m.slice(-3).map(function(x){return x.v}).join(' \u00b7 ')):''; }
function sCounts(){ var el=document.getElementById('sCounts'), cw=wkOfD(today());
  var wk=arr('log').filter(function(e){ return wkOfD(e.dd)===cw; });
  if(!wk.length){ el.textContent='WK '+cw+' \u00b7 no misses logged yet'; return; }
  var c={}; CATS.forEach(function(k){c[k]=0}); wk.forEach(function(e){ if(c[e.cat]!=null)c[e.cat]++; });
  var modal=CATS.reduce(function(a,b){ return c[b]>c[a]?b:a; });
  el.textContent='WK '+cw+' \u00b7 '+CATS.map(function(k){return k+' '+c[k]}).join(' \u00b7 ')+' \u2192 '+modal+': '+RX[modal]; }
function esc2(x){ var d=document.createElement('i'); d.textContent=x; return d.innerHTML; }
function sList(){ var el=document.getElementById('sList'); el.innerHTML='';
  var L=arr('log'); L.slice(-5).reverse().forEach(function(e){ var i=L.indexOf(e);
    var d=document.createElement('div'); d.className='lg';
    d.innerHTML=e.dd.slice(5)+' \u00b7 '+esc2(e.src)+' \u00b7 <span class="cat">'+e.cat+'</span>'+
      '<span class="del" data-i="'+i+'">\u00d7</span><br><span class="fx">fix: '+esc2(e.fix)+'</span>'+
      '<label><input type="checkbox" data-i="'+i+'" data-f="r48"'+(e.r48?' checked':'')+'> +48h</label>'+
      '<label><input type="checkbox" data-i="'+i+'" data-f="rfri"'+(e.rfri?' checked':'')+'> FRI</label>';
    el.appendChild(d); });
  el.querySelectorAll('input[type=checkbox]').forEach(function(b){
    b.addEventListener('change',function(){ arr('log')[+b.dataset.i][b.dataset.f]=b.checked?1:0; save(); }); });
  el.querySelectorAll('.del').forEach(function(x){
    x.addEventListener('click',function(){ tomb(arr('log')[+x.dataset.i]); arr('log').splice(+x.dataset.i,1); save(); sList(); sCounts(); }); }); }
function pbo(){ if(!state.pb||typeof state.pb!=='object') state.pb={}; return state.pb; }
function recs(){ var el=document.getElementById('recRow'); el.innerHTML='';
  var defs=[
    {k:null,label:'ZETAMAC',val:(zeta()===null?'\u2013':zeta()),hint:'auto from LOG SCORE'},
    {k:'lc',label:'LC CLEAN',val:pbo().lc||'\u2013',hint:'fastest clean medium, e.g. 14:30'},
    {k:'matmul',label:'MATMUL %',val:pbo().matmul||'\u2013',hint:'best % of cuBLAS, e.g. 71'},
    {k:'llm',label:'TOK/S',val:pbo().llm||'\u2013',hint:'best tokens/sec on the Orin'}];
  defs.forEach(function(d){ var c=document.createElement('span'); c.className='chip';
    c.innerHTML=d.label+' <b style="color:var(--build)">'+String(d.val).replace(/[<>&]/g,'')+'</b>'; c.title=d.hint;
    if(d.k) c.addEventListener('click',function(){ var v=prompt(d.label+' PB ('+d.hint+'):',pbo()[d.k]||'');
      if(v===null) return; v=v.trim(); if(v==='') delete pbo()[d.k]; else pbo()[d.k]=v.slice(0,12);
      save(); recs(); });
    el.appendChild(c); }); }
function sheetOpen(o){ document.getElementById('sheet').classList.toggle('open',o);
  document.getElementById('backdrop').classList.toggle('open',o);
  if(o){ recs(); zLine(); sCounts(); sList(); document.getElementById('sMsg').textContent=''; } }
document.getElementById('logBtn').addEventListener('click',function(){ sheetOpen(true); });
document.getElementById('shClose').addEventListener('click',function(){ sheetOpen(false); });
document.getElementById('backdrop').addEventListener('click',function(){ sheetOpen(false); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape') sheetOpen(false); });
document.getElementById('zGo').addEventListener('click',function(){
  var v=+document.getElementById('zV').value; if(!v) return;
  var was=zeta(); arr('mm').push({d:today(),v:v}); save();
  document.getElementById('zV').value='';
  zLine((was!==null&&v>was)?('NEW PB '+v+' (was '+was+')'):null); recs(); });
(function(){ var row=document.getElementById('catChips');
  CATS.forEach(function(k){ var c=document.createElement('span'); c.className='chip'; c.textContent=k;
    c.addEventListener('click',function(){ selCat=k; row.querySelectorAll('.chip').forEach(function(x){x.classList.toggle('sel',x.textContent===k)}); });
    row.appendChild(c); }); })();
document.querySelectorAll('#srcChips .chip').forEach(function(c){
  c.addEventListener('click',function(){ var s=document.getElementById('sSrc');
    document.querySelectorAll('#srcChips .chip').forEach(function(x){x.classList.toggle('sel',x===c)});
    s.dataset.pre=c.dataset.p; s.focus(); }); });
document.getElementById('sGo').addEventListener('click',function(){
  var pre=document.getElementById('sSrc').dataset.pre||'';
  var src=(pre+document.getElementById('sSrc').value.trim()).trim();
  var fix=document.getElementById('sFix').value.trim();
  var msg=document.getElementById('sMsg');
  if(!src||!selCat||!fix){ msg.textContent='need: source + category + a one-sentence fix'; return; }
  arr('log').push({dd:today(),src:src.slice(0,24),cat:selCat,fix:fix.slice(0,120),r48:0,rfri:0}); save();
  document.getElementById('sSrc').value=''; document.getElementById('sFix').value='';
  selCat=null; document.querySelectorAll('#catChips .chip').forEach(function(x){x.classList.remove('sel')});
  msg.textContent='Logged. The fix is the rep.'; sCounts(); sList(); });

// paint from cache, then reconcile with cloud (union-merged; cloud wins scalars)
state=lget(); render(); sync('\u2026');
function settled(){ cloudReady=true; if(saveQueued){ saveQueued=false; save(); } }
fetch(API,{credentials:'include'}).then(function(r){
  if(r.status===401) return Promise.reject('auth');
  return r.ok?r.json():Promise.reject();
}).then(function(c){
  if(c&&typeof c==='object'){ state=mergeState(state,c); lset(); render(); sync('\u2713 synced'); }
  settled();
}).catch(function(e){ sync(e==='auth'?'signed out \u00b7 log in at /private':'offline \u00b7 on this device'); settled(); });
</script>
